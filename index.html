<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body>
<pre id="out">Fetching...</pre>
<script>
const SHEET_ID = "1CtR3_lNWm9zbL4rZhlQ0-Rw9BSDtAnRa5vnQa9Ox20c";
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent("Pressure Points")}`;

fetch(url)
  .then(r=>r.text())
  .then(text=>{
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    const out = document.getElementById("out");

    // Show first 5 rows raw
    out.textContent = "=== TOTAL ROWS: " + rows.length + "\n\n";
    out.textContent += "=== COLUMN TYPES ===\n";
    json.table.cols.forEach((c,i)=>{ out.textContent += `col[${i}]: type=${c.type} label=${c.label}\n`; });
    out.textContent += "\n=== FIRST 5 ROWS (raw) ===\n";
    rows.slice(0,5).forEach((r,i)=>{
      out.textContent += `Row ${i}: `;
      r.c.slice(0,4).forEach((c,ci)=>{
        out.textContent += `[${ci}]=${JSON.stringify(c)} `;
      });
      out.textContent += "\n";
    });
    out.textContent += "\n=== LAST 3 ROWS (raw) ===\n";
    rows.slice(-3).forEach((r,i)=>{
      out.textContent += `Row ${rows.length-3+i}: `;
      r.c.slice(0,4).forEach((c,ci)=>{
        out.textContent += `[${ci}]=${JSON.stringify(c)} `;
      });
      out.textContent += "\n";
    });
  })
  .catch(e=>{ document.getElementById("out").textContent = "ERROR: "+e; });
</script>
</body>
</html>
